# Backend and frontend. Ensure backend/.env.local exists (copy from backend/.env.example).
# Frontend: http://localhost:3001  |  Backend API: http://localhost:5003
version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "3001:5173"
    depends_on:
      - backend
    environment:
      - VITE_BASE_URL=http://localhost:5003/api/v1

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.local
    ports:
      - "5003:5003"
